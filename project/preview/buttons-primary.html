<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons — primary</title><link rel="stylesheet" href="_preview.css"></head>
<body>
<style>
  .btn {font-family:var(--font-sans);font-size:14px;font-weight:500;letter-spacing:0.02em;border:none;cursor:pointer;border-radius:8px;padding:12px 22px;transition:background var(--dur-base) var(--ease-out), transform 100ms var(--ease-out);}
  .btn-primary {background:#1A1A1A;color:#fff;}
  .btn-primary:hover {background:#000;}
  .btn-primary:active {transform:scale(0.98);}
  .btn-primary[disabled]{background:#B5B5B5;cursor:not-allowed;}
</style>
<div style="display:flex;flex-direction:column;gap:14px;">
  <div class="tag">Primary · #1A1A1A · used for the ONE action per section</div>
  <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
    <button class="btn btn-primary">Jetzt entdecken</button>
    <button class="btn btn-primary">In den Warenkorb</button>
    <button class="btn btn-primary" style="padding:14px 28px;font-size:15px;">Newsletter abonnieren</button>
    <button class="btn btn-primary" disabled>Ausverkauft</button>
  </div>
  <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
    <button class="btn btn-primary" style="background:#000;">: hover</button>
    <button class="btn btn-primary" style="transform:scale(0.98);">: pressed (0.98)</button>
  </div>
</div>
</body></html>
