<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows</title><link rel="stylesheet" href="_preview.css"></head>
<body>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;font-family:var(--font-sans);padding:8px;">
  <div style="text-align:center;">
    <div style="height:80px;background:#fff;border-radius:12px;box-shadow:0 1px 2px rgba(26,26,26,0.04);"></div>
    <div style="font-size:11px;font-weight:500;margin-top:10px;">xs</div>
    <div class="r-mono" style="font-size:10px;color:#7A7A7A;">chips · badges</div>
  </div>
  <div style="text-align:center;">
    <div style="height:80px;background:#fff;border-radius:12px;box-shadow:0 1px 8px rgba(26,26,26,0.04);"></div>
    <div style="font-size:11px;font-weight:500;margin-top:10px;">sm</div>
    <div class="r-mono" style="font-size:10px;color:#7A7A7A;">resting card</div>
  </div>
  <div style="text-align:center;">
    <div style="height:80px;background:#fff;border-radius:12px;box-shadow:0 6px 20px rgba(26,26,26,0.06);"></div>
    <div style="font-size:11px;font-weight:500;margin-top:10px;">md</div>
    <div class="r-mono" style="font-size:10px;color:#7A7A7A;">hover lift</div>
  </div>
  <div style="text-align:center;">
    <div style="height:80px;background:#fff;border-radius:12px;box-shadow:0 18px 48px rgba(26,26,26,0.10);"></div>
    <div style="font-size:11px;font-weight:500;margin-top:10px;">lg</div>
    <div class="r-mono" style="font-size:10px;color:#7A7A7A;">popovers · modals</div>
  </div>
</div>
</body></html>
