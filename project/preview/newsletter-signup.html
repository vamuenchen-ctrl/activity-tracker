<!doctype html>
<html><head><meta charset="utf-8"><title>Newsletter signup</title><link rel="stylesheet" href="_preview.css"></head>
<body>
<style>
  .nl{background:#D2F0E8;border-radius:12px;padding:26px 24px;display:flex;flex-direction:column;gap:14px;font-family:var(--font-sans);}
  .nl h3{font-family:var(--font-display);font-size:28px;line-height:1.1;letter-spacing:-0.02em;color:#1A1A1A;margin:0;}
  .nl p{font-size:13px;color:#4A4A4A;margin:0;max-width:38ch;}
  .nl-form{display:flex;gap:8px;align-items:stretch;}
  .nl-form input{flex:1;border:1px solid #1A1A1A;background:#fff;border-radius:8px;padding:11px 14px;font-family:var(--font-sans);font-size:14px;color:#1A1A1A;outline:none;}
  .nl-form button{background:#1A1A1A;color:#fff;border:none;border-radius:8px;padding:11px 18px;font-family:var(--font-sans);font-size:14px;font-weight:500;cursor:pointer;letter-spacing:0.02em;}
</style>
<div class="nl">
  <div>
    <h3>Frisch im Posteingang.</h3>
    <p>Neue Produkte, Hintergründe, Aktionen — einmal pro Monat. Kein Spam.</p>
  </div>
  <form class="nl-form" onsubmit="event.preventDefault();">
    <input type="email" placeholder="ihre.email@beispiel.at" />
    <button>Abonnieren</button>
  </form>
</div>
</body></html>
