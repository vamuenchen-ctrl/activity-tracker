<!doctype html>
<html><head><meta charset="utf-8"><title>Neutrals</title><link rel="stylesheet" href="_preview.css"></head>

<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;">

    <div class="meta"><div class="name">Weiß</div><div class="hex">#FFFFFF</div></div>
  </div>
  <div class="swatch" style="background:#F5F5F3;height:110px;">

  <div class="swatch" style="background:#EEEEEE;height:110px;">
    <div class="meta"><div class="name">Hellgrau</div><div class="hex">#EEEEEE</div></div>
  </div>
  <div class="swatch" style="background:#F4EFEE;height:110px;">
    <div class="meta"><div class="name">Rosé-Weiß</div><div class="hex">#F4EFEE</div></div>
  </div>
  <div class="swatch dark" style="background:#1A1A1A;height:110px;">
    <div class="meta"><div class="name">Near-Black</div><div class="hex">#1A1A1A</div></div>
  </div>
