<!doctype html>
<html><head><meta charset="utf-8"><title>Motion & easing</title><link rel="stylesheet" href="_preview.css"></head>
<body>
<style>
  body{font-family:var(--font-sans);}
  .track{position:relative;height:36px;background:#F5F5F3;border-radius:18px;overflow:hidden;}
  .dot{position:absolute;top:6px;left:6px;width:24px;height:24px;border-radius:50%;background:#1A1A1A;}
  .dot.f{animation:slide-f 2200ms cubic-bezier(0.22,1,0.36,1) infinite alternate;}
  .dot.b{animation:slide-f 1400ms cubic-bezier(0.22,1,0.36,1) infinite alternate;background:#677E3D;}
  .dot.s{animation:slide-f 3200ms cubic-bezier(0.22,1,0.36,1) infinite alternate;background:#26496F;}
  @keyframes slide-f{from{left:6px;}to{left:calc(100% - 30px);}}
  .row3{display:grid;grid-template-columns:80px 1fr;gap:10px 14px;align-items:center;}
  .row3 .lbl{font-size:11px;color:#4A4A4A;}
  .row3 .lbl b{display:block;font-weight:500;color:#1A1A1A;font-size:12px;}
</style>
<div class="row3">
  <div class="lbl"><b>fast · 140ms</b>hover tints</div><div class="track"><div class="dot b"></div></div>
  <div class="lbl"><b>base · 220ms</b>most transitions</div><div class="track"><div class="dot f"></div></div>
  <div class="lbl"><b>slow · 420ms</b>page sections</div><div class="track"><div class="dot s"></div></div>
</div>
<div style="margin-top:12px;font-size:11px;color:#7A7A7A;">All easing <code>cubic-bezier(0.22, 1, 0.36, 1)</code> · no bounce, no spring. Fades and small Y-translates only.</div>
</body></html>
