<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic colors</title><link rel="stylesheet" href="_preview.css"></head>
<body>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">
  <div style="background:#fff;border:1px solid #E8E7E3;border-radius:12px;padding:14px;">
    <div style="height:32px;border-radius:6px;background:#1A1A1A;"></div>
    <div style="margin-top:10px;font-size:12px;font-weight:500;">--accent</div>
    <div style="font-family:var(--font-mono);font-size:10.5px;color:#7A7A7A;">#1A1A1A · primary CTA</div>
  </div>
  <div style="background:#fff;border:1px solid #E8E7E3;border-radius:12px;padding:14px;">
    <div style="height:32px;border-radius:6px;background:#677E3D;"></div>
    <div style="margin-top:10px;font-size:12px;font-weight:500;">--positive</div>
    <div style="font-family:var(--font-mono);font-size:10.5px;color:#7A7A7A;">#677E3D · success</div>
  </div>
  <div style="background:#fff;border:1px solid #E8E7E3;border-radius:12px;padding:14px;">
    <div style="height:32px;border-radius:6px;background:#C94963;"></div>
    <div style="margin-top:10px;font-size:12px;font-weight:500;">--danger</div>
    <div style="font-family:var(--font-mono);font-size:10.5px;color:#7A7A7A;">#C94963 · errors</div>
  </div>
  <div style="background:#fff;border:1px solid #E8E7E3;border-radius:12px;padding:14px;">
    <div style="height:32px;border-radius:6px;background:#26496F;"></div>
    <div style="margin-top:10px;font-size:12px;font-weight:500;">--info</div>
    <div style="font-family:var(--font-mono);font-size:10.5px;color:#7A7A7A;">#26496F · informational</div>
  </div>
</div>
</body></html>
