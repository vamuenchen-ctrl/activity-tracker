<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title><link rel="stylesheet" href="_preview.css"></head>
<body>
<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px;font-family:var(--font-sans);">
  <div style="text-align:center;">
    <div style="height:64px;background:#F5F5F3;border:1px solid #E8E7E3;border-radius:2px;"></div>
    <div style="font-size:11px;font-weight:500;margin-top:6px;">xs</div>
    <div class="r-mono" style="font-size:10px;color:#7A7A7A;">2 px</div>
  </div>
  <div style="text-align:center;">
    <div style="height:64px;background:#F5F5F3;border:1px solid #E8E7E3;border-radius:4px;"></div>
    <div style="font-size:11px;font-weight:500;margin-top:6px;">sm</div>
    <div class="r-mono" style="font-size:10px;color:#7A7A7A;">4 px</div>
  </div>
  <div style="text-align:center;">
    <div style="height:64px;background:#F5F5F3;border:1px solid #E8E7E3;border-radius:8px;"></div>
    <div style="font-size:11px;font-weight:500;margin-top:6px;">md · buttons</div>
    <div class="r-mono" style="font-size:10px;color:#7A7A7A;">8 px</div>
  </div>
  <div style="text-align:center;">
    <div style="height:64px;background:#F5F5F3;border:1px solid #E8E7E3;border-radius:12px;"></div>
    <div style="font-size:11px;font-weight:500;margin-top:6px;">lg · cards</div>
    <div class="r-mono" style="font-size:10px;color:#7A7A7A;">12 px</div>
  </div>
  <div style="text-align:center;">
    <div style="height:64px;background:#F5F5F3;border:1px solid #E8E7E3;border-radius:16px;"></div>
    <div style="font-size:11px;font-weight:500;margin-top:6px;">xl</div>
    <div class="r-mono" style="font-size:10px;color:#7A7A7A;">16 px</div>
  </div>
  <div style="text-align:center;">
    <div style="height:64px;background:#F5F5F3;border:1px solid #E8E7E3;border-radius:999px;"></div>
    <div style="font-size:11px;font-weight:500;margin-top:6px;">pill</div>
    <div class="r-mono" style="font-size:10px;color:#7A7A7A;">999 px</div>
  </div>
</div>
</body></html>
