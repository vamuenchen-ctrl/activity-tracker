<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing scale</title><link rel="stylesheet" href="_preview.css"></head>
<body>
<div style="display:flex;flex-direction:column;gap:6px;font-family:var(--font-sans);">
  <div style="font-size:11px;color:#7A7A7A;letter-spacing:0.04em;margin-bottom:6px;">4 px base · linear then geometric jumps · used for padding, gap, margin.</div>
  <div style="display:grid;grid-template-columns:60px 1fr;gap:10px;align-items:center;font-size:11.5px;color:#4A4A4A;">
    <span class="r-mono" style="color:#7A7A7A;">4 / 1</span>   <div style="height:8px;background:#E5DAD1;width:4px;border-radius:2px;"></div>
    <span class="r-mono" style="color:#7A7A7A;">8 / 2</span>   <div style="height:8px;background:#E5DAD1;width:8px;border-radius:2px;"></div>
    <span class="r-mono" style="color:#7A7A7A;">12 / 3</span>  <div style="height:8px;background:#E5DAD1;width:12px;border-radius:2px;"></div>
    <span class="r-mono" style="color:#7A7A7A;">16 / 4</span>  <div style="height:8px;background:#E5DAD1;width:16px;border-radius:2px;"></div>
    <span class="r-mono" style="color:#7A7A7A;">24 / 6</span>  <div style="height:8px;background:#D2F0E8;width:24px;border-radius:2px;"></div>
    <span class="r-mono" style="color:#7A7A7A;">32 / 8</span>  <div style="height:8px;background:#D2F0E8;width:32px;border-radius:2px;"></div>
    <span class="r-mono" style="color:#7A7A7A;">48 / 12</span> <div style="height:8px;background:#D2F0E8;width:48px;border-radius:2px;"></div>
    <span class="r-mono" style="color:#7A7A7A;">64 / 16</span> <div style="height:8px;background:#6ACCB2;width:64px;border-radius:2px;"></div>
    <span class="r-mono" style="color:#7A7A7A;">80 / 20</span> <div style="height:8px;background:#6ACCB2;width:80px;border-radius:2px;"></div>
    <span class="r-mono" style="color:#7A7A7A;">96 / 24</span> <div style="height:8px;background:#677E3D;width:96px;border-radius:2px;"></div>
  </div>
</div>
</body></html>
