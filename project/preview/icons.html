<!doctype html>
<html><head><meta charset="utf-8"><title>Icon set</title><link rel="stylesheet" href="_preview.css"></head>
<body>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  .icons{display:grid;grid-template-columns:repeat(8,1fr);gap:14px;align-items:center;justify-items:center;}
  .icons > div{display:flex;flex-direction:column;align-items:center;gap:6px;font-family:var(--font-sans);font-size:10px;color:#7A7A7A;}
  .icons svg{width:24px;height:24px;color:#1A1A1A;stroke-width:1.5;}
</style>
<div class="icons">
  <div><i data-lucide="search"></i>search</div>
  <div><i data-lucide="user"></i>account</div>
  <div><i data-lucide="shopping-bag"></i>bag</div>
  <div><i data-lucide="heart"></i>wishlist</div>
  <div><i data-lucide="globe"></i>language</div>
  <div><i data-lucide="menu"></i>menu</div>
  <div><i data-lucide="chevron-down"></i>chevron</div>
  <div><i data-lucide="leaf"></i>vegan</div>
  <div><i data-lucide="droplet"></i>hydration</div>
  <div><i data-lucide="moon"></i>night</div>
  <div><i data-lucide="sun"></i>day</div>
  <div><i data-lucide="recycle"></i>recycle</div>
  <div><i data-lucide="truck"></i>shipping</div>
  <div><i data-lucide="shield-check"></i>tested</div>
  <div><i data-lucide="plus"></i>add</div>
  <div><i data-lucide="x"></i>close</div>
</div>
<div style="margin-top:12px;font-size:11px;color:#7A7A7A;letter-spacing:0.02em;">Lucide · 1.5 px stroke · round caps · 24 px nominal grid. <b>Substitution flagged</b> — swap to brand SVGs when supplied.</div>
<script>lucide.createIcons();</script>
</body></html>
