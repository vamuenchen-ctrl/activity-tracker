<!doctype html>
<html><head><meta charset="utf-8"><title>Form inputs</title><link rel="stylesheet" href="_preview.css"></head>
<body>
<style>
  .field {display:flex;flex-direction:column;gap:6px;font-family:var(--font-sans);}
  .field label {font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:#4A4A4A;}
  .field input, .field select {font-family:var(--font-sans);font-size:14px;padding:12px 14px;border:1px solid #E8E7E3;border-radius:8px;background:#fff;color:#1A1A1A;outline:none;transition:border-color var(--dur-base) var(--ease-out), box-shadow var(--dur-base) var(--ease-out);}
  .field input:focus {border-color:#1A1A1A;box-shadow:0 0 0 3px rgba(26,26,26,0.08);}
  .field input[type=email]::placeholder{color:#B5B5B5;}
</style>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
  <div class="field">
    <label>E-Mail-Adresse</label>
    <input type="email" placeholder="ihre.email@beispiel.at"/>
  </div>
  <div class="field">
    <label>E-Mail · focused</label>
    <input type="email" value="anna@beispiel.at" style="border-color:#1A1A1A;box-shadow:0 0 0 3px rgba(26,26,26,0.08);"/>
  </div>
  <div class="field">
    <label>Sortieren nach</label>
    <select><option>Empfehlung</option><option>Preis aufsteigend</option><option>Neu</option></select>
  </div>
  <div class="field">
    <label>Fehler</label>
    <input type="text" value="zu kurz" style="border-color:#C94963;"/>
    <span style="font-size:11px;color:#C94963;margin-top:2px;">Mindestens 6 Zeichen.</span>
  </div>
</div>
</body></html>
