// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel" data-presets="react">
/* ===== data.jsx ===== */
/* AKTIVITÄTSMESSER — data layer: activity catalog + storage + day model */

/* ─────────────────────────────────────────────────────────────
   Activity catalog (matches the spec exactly)
   - short: Kurz-Wording in der App-UI
   - label: voller Wortlaut aus der ÜBERSICHT der Word-Vorlage
   - perContact: true  → marked per contact in the bottom sheet
   - perContact: false → daily quick-toggle (one per day)
   ───────────────────────────────────────────────────────────── */
const ACTIVITY_GROUPS = [
  {
    id: 'sichtbarkeit', label: 'Sichtbarkeit', color: 'var(--cat-sicht)', perContact: false,
    items: [
      { id: 'promo',       short: 'Angebote promotet',  label: 'Angebote promotet (in der Kundengruppe, im Status, Story... gepostet)',                                  pts: 1 },
      { id: 'whatsapp',    short: 'WhatsApp Status',    label: 'Auf WhatsApp sichtbar gemacht (Status)',                                                                  pts: 1 },
      { id: 'instafb',     short: 'Social Media Story', label: 'Auf Instagram/Facebook in Story sichtbar gemacht (Story mit Umfrage-Sticker startet Gespräche)',          pts: 1 },
      { id: 'kommentare',  short: '3x Kommentare',      label: '3× auf Nicht-RINGANA Partner-Accounts kommentiert (Social Media)',                                        pts: 1 },
      { id: 'reel',        short: 'Reel',               label: 'Reel gepostet',                                                                                           pts: 1 },
      { id: 'mehrwert',    short: 'Beitrag',            label: 'Beitrag geteilt (Tipp für Mehrwertpost: trau dich auch den Schmerzpunkt klar zu benennen, nicht „nur" den Nutzen)', pts: 1 },
    ],
  },
  {
    id: 'kontakt', label: 'Kontakt & Gespräch', color: 'var(--cat-kontakt)', perContact: true,
    items: [
      { id: 'neukontakt',      short: 'Neukontakt',       label: 'Neue Person kennengelernt (Neukontakt)',                                                          pts: 1 },
      { id: 'altkontakt',      short: 'Altkontakt',       label: 'Kontakt aus der Vergangenheit wiederbelebt (Altkontakt)',                                         pts: 1 },
      { id: 'bedurfnisse',     short: 'Bedürfnisse',      label: 'Persönlichkeitsmerkmale & Bedürfnisse einer Person notiert',                                      pts: 1 },
      { id: 'sprachnachricht', short: 'Sprachnachricht',  label: 'Sprachnachricht an Kontakt geschickt (WhatsApp, Messenger usw.)',                                 pts: 1 },
      { id: 'telefonat',       short: 'Telefonat',        label: 'Echtes Telefonat oder reales Gespräch geführt (Verbindungsaufbau deluxe)',                        pts: 1 },
      { id: 'kompliment',      short: 'Kompliment',       label: 'Ehrliches Kompliment / ein Danke, eine nette Rückmeldung ausgesprochen',                         pts: 1 },
      { id: 'weiterempfehlung',short: 'Weiterempfehlung', label: 'Nach Weiterempfehlung gefragt oder Kundenfeedback eingeholt (dieses gerne in der Gruppe für alle teilen)', pts: 1 },
    ],
  },
  {
    id: 'followup', label: 'Follow-Up & Einladung', color: 'var(--cat-follow)', perContact: true,
    items: [
      { id: 'followup',   short: 'Follow-Up',  label: 'Follow-Up Nachricht an Kontakt gesendet (ohne Erwartung Gespräche am Laufen halten)',  pts: 1 },
      { id: 'einladung',  short: 'Einladung',  label: 'Zu Event / Zoom / Präsentation oder 1:1 Gespräch eingeladen',                          pts: 1 },
      { id: 'terminiert', short: 'Terminiert', label: 'Termin für Produkt- oder Businesspräsentation vereinbart',                             pts: 2 },
      { id: 'teilnahme',  short: 'Teilnahme',  label: 'Termin für Produkt- oder Businesspräsentation durchgeführt',                           pts: 2 },
    ],
  },
  {
    id: 'umsatz', label: 'Direkter Umsatz', color: 'var(--cat-umsatz)', perContact: true,
    items: [
      { id: 'bestellung',   short: 'Bestellung',   label: 'Produktbestellung abgeschlossen', pts: 2 },
      { id: 'neupartner',   short: 'Neupartner',   label: 'Neupartner eingeschrieben',       pts: 3 },
      { id: 'founderbonus', short: 'Founderbonus', label: 'Inkl. Founderbonus',              pts: 2 },
    ],
  },
  {
    id: 'mindset', label: 'Mindset', color: 'var(--cat-mindset)', perContact: false,
    items: [
      { id: 'mindset15',       short: '15 Min. Mindset', label: '15 Min. Mindset-Arbeit (Buch / Podcast / Video)',                                                                              pts: 1 },
      { id: 'wochenreflexion', short: 'Wochenreflexion', label: 'Wochenreflexion / Rückblick gemacht (freitags und dann Aktivitäten und auch deine gemeisterten Hürden in der Gruppe feiern)', pts: 3 },
    ],
  },
];

/* Flattened lookup of every activity by id */
const ACTIVITY_BY_ID = ACTIVITY_GROUPS.reduce((m, g) => {
  g.items.forEach(i => { m[i.id] = { ...i, groupId: g.id, color: g.color, groupLabel: g.label }; });
  return m;
}, {});

const PER_CONTACT_GROUPS = ACTIVITY_GROUPS.filter(g => g.perContact);
const DAILY_GROUPS       = ACTIVITY_GROUPS.filter(g => !g.perContact);

/* ─────────────────────────────────────────────────────────────
   Date helpers
   ───────────────────────────────────────────────────────────── */
const MIN_DATE = new Date(2026, 0, 1);    // 01.01.2026
const MAX_DATE = new Date(2040, 11, 31);  // 31.12.2040

function isoDay(d) {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function parseIso(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function addDays(d, n) {
  const c = new Date(d); c.setDate(c.getDate() + n); return c;
}
function startOfWeek(d) {
  // Monday-first
  const c = new Date(d); c.setHours(0,0,0,0);
  const dow = (c.getDay() + 6) % 7; // 0=Mon … 6=Sun
  c.setDate(c.getDate() - dow);
  return c;
}
function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
function endOfMonth(d)   { return new Date(d.getFullYear(), d.getMonth() + 1, 0); }
function sameDay(a, b)   { return isoDay(a) === isoDay(b); }

const DE_WEEKDAYS_LONG  = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const DE_WEEKDAYS_SHORT = ['Mo','Di','Mi','Do','Fr','Sa','So'];
const DE_MONTHS = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

function formatDateLong(d) {
  return `${DE_WEEKDAYS_LONG[d.getDay()]}, ${d.getDate()}. ${DE_MONTHS[d.getMonth()]}`;
}
function formatDateShort(d) {
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
}
function formatMonth(d) {
  return `${DE_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}

/* ─────────────────────────────────────────────────────────────
   Storage  (localStorage with namespacing)
   ───────────────────────────────────────────────────────────── */
const STORAGE_KEY = 'aktivitaetsmesser:v1';

const DEFAULT_STATE = {
  user: { name: '', dailyGoalDefault: 6, anonymized: false, onboarded: false },
  contacts: [],          // [{ id, name, createdAt }]
  days: {},              // { 'YYYY-MM-DD': { goal?, contactActivities: { contactId: [id…] }, daily: [id…] } }
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return JSON.parse(JSON.stringify(DEFAULT_STATE));
    return { ...DEFAULT_STATE, ...JSON.parse(raw) };
  } catch (e) {
    return JSON.parse(JSON.stringify(DEFAULT_STATE));
  }
}
function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (e) {}
}

/* ─────────────────────────────────────────────────────────────
   Day model helpers
   ───────────────────────────────────────────────────────────── */
function getDay(state, iso) {
  return state.days[iso] || { goal: null, contactActivities: {}, daily: [] };
}
function dayPoints(state, iso) {
  const day = getDay(state, iso);
  let pts = 0;
  // daily activities
  (day.daily || []).forEach(aid => {
    const a = ACTIVITY_BY_ID[aid]; if (a) pts += a.pts;
  });
  // per-contact activities
  Object.values(day.contactActivities || {}).forEach(ids => {
    ids.forEach(aid => {
      const a = ACTIVITY_BY_ID[aid]; if (a) pts += a.pts;
    });
  });
  return pts;
}
function contactPointsOnDay(state, iso, contactId) {
  const day = getDay(state, iso);
  const ids = (day.contactActivities && day.contactActivities[contactId]) || [];
  return ids.reduce((s, aid) => s + (ACTIVITY_BY_ID[aid]?.pts || 0), 0);
}
function dayGoal(state, iso) {
  const day = getDay(state, iso);
  return day.goal != null ? day.goal : state.user.dailyGoalDefault;
}
function weekPoints(state, anchorIso) {
  const anchor = parseIso(anchorIso);
  const start = startOfWeek(anchor);
  let s = 0;
  for (let i = 0; i < 7; i++) {
    const d = addDays(start, i);
    if (d > new Date()) break;
    if (d < MIN_DATE) continue;
    s += dayPoints(state, isoDay(d));
  }
  return s;
}
function monthPoints(state, anchorIso) {
  const anchor = parseIso(anchorIso);
  const s = startOfMonth(anchor);
  const e = endOfMonth(anchor);
  let total = 0;
  for (let d = new Date(s); d <= e && d <= new Date(); d = addDays(d, 1)) {
    if (d < MIN_DATE) continue;
    total += dayPoints(state, isoDay(d));
  }
  return total;
}

/* ─────────────────────────────────────────────────────────────
   Mutation helpers (return a new state object)
   ───────────────────────────────────────────────────────────── */
function withDay(state, iso, mutator) {
  const day = JSON.parse(JSON.stringify(getDay(state, iso)));
  mutator(day);
  return { ...state, days: { ...state.days, [iso]: day } };
}
function toggleDailyActivity(state, iso, aid) {
  return withDay(state, iso, d => {
    d.daily = d.daily || [];
    const i = d.daily.indexOf(aid);
    if (i >= 0) d.daily.splice(i, 1);
    else d.daily.push(aid);
  });
}
function toggleContactActivity(state, iso, contactId, aid) {
  return withDay(state, iso, d => {
    d.contactActivities = d.contactActivities || {};
    const arr = d.contactActivities[contactId] = d.contactActivities[contactId] || [];
    const i = arr.indexOf(aid);
    if (i >= 0) arr.splice(i, 1);
    else arr.push(aid);
    if (arr.length === 0) delete d.contactActivities[contactId];
  });
}
function addContact(state, name) {
  const id = 'c' + (Date.now().toString(36)) + Math.random().toString(36).slice(2, 5);
  return {
    ...state,
    contacts: [...state.contacts, { id, name: name.trim(), createdAt: isoDay(new Date()) }],
  };
}
function renameContact(state, id, name) {
  return {
    ...state,
    contacts: state.contacts.map(c => c.id === id ? { ...c, name: name.trim() } : c),
  };
}
function anonymizeContacts(state) {
  return {
    ...state,
    user: { ...state.user, anonymized: true },
    contacts: state.contacts.map((c, i) => ({ ...c, name: `Person ${i + 1}` })),
  };
}
function setDailyGoalForDay(state, iso, goal) {
  return withDay(state, iso, d => { d.goal = goal; });
}

Object.assign(window, {
  ACTIVITY_GROUPS, ACTIVITY_BY_ID, PER_CONTACT_GROUPS, DAILY_GROUPS,
  MIN_DATE, MAX_DATE, isoDay, parseIso, addDays, startOfWeek, startOfMonth, endOfMonth, sameDay,
  DE_WEEKDAYS_LONG, DE_WEEKDAYS_SHORT, DE_MONTHS,
  formatDateLong, formatDateShort, formatMonth,
  loadState, saveState, DEFAULT_STATE,
  getDay, dayPoints, contactPointsOnDay, dayGoal, weekPoints, monthPoints,
  toggleDailyActivity, toggleContactActivity, addContact, renameContact, anonymizeContacts,
  setDailyGoalForDay,
});

</script>
<script type="text/babel" data-presets="react">
/* ===== ui.jsx ===== */
/* AKTIVITÄTSMESSER — shared UI primitives */

const { useEffect, useRef, useState, useLayoutEffect } = React;

/* ───── Icon (Lucide via global) ───── */
// Renders a <span> with dangerouslySetInnerHTML so React never owns the SVG
// child nodes — eliminating the "removeChild: not a child" crash that used to
// happen when lucide.createIcons() replaced React-managed <i> nodes with <svg>.
const _iconSvgCache = {};
function _lucideToSvgHtml(name, stroke, size) {
  const key = name + '|' + stroke + '|' + size;
  if (_iconSvgCache[key]) return _iconSvgCache[key];
  try {
    if (typeof window.lucide?.createElement === 'function' && window.lucide.icons?.[name]) {
      const svg = window.lucide.createElement(window.lucide.icons[name], {
        'stroke-width': stroke, width: size, height: size,
      });
      return (_iconSvgCache[key] = svg.outerHTML);
    }
  } catch (e) {}
  return '';
}
function Icon({ name, size = 18, stroke = 1.6, style }) {
  const html = _lucideToSvgHtml(name, stroke, size);
  return (
    <span
      style={{ width: size, height: size, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, ...style }}
      dangerouslySetInnerHTML={{ __html: html }}
    />
  );
}

/* ───── Button ───── */
function Btn({ variant = 'primary', size = 'md', block, children, onClick, disabled, type = 'button' }) {
  const cls = ['btn', `btn-${variant}`, block ? 'btn-block' : ''].filter(Boolean).join(' ');
  return (
    <button className={cls} onClick={onClick} disabled={disabled} type={type}
      style={size === 'lg' ? { padding: '16px 26px', fontSize: 16 } : null}>
      {children}
    </button>
  );
}

/* ───── Progress ring ─────
   Centered SVG ring, with a numeric center stack. value/of as numbers. */
function ProgressRing({ value, of, size = 160, stroke = 11, label = 'Tagesziel' }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const pct = of > 0 ? Math.min(1, value / of) : 0;
  const offset = c * (1 - pct);
  return (
    <div className="ring-wrap" style={{ width: size, height: size }}>
      <svg className="ring-svg" viewBox={`0 0 ${size} ${size}`}>
        <circle className="ring-track" cx={size/2} cy={size/2} r={r} />
        <circle className="ring-fill"  cx={size/2} cy={size/2} r={r}
          strokeDasharray={c} strokeDashoffset={offset} />
      </svg>
      <div className="ring-center">
        <span className="num">{value}</span>
        <span className="of">von <b>{of}</b> Punkten</span>
      </div>
    </div>
  );
}

/* ───── Bottom sheet — generic ───── */
function Sheet({ open, onClose, title, sub, children, peakClose = true }) {
  const hasHead = title || sub;
  return (
    <>
      <div className={`sheet-backdrop ${open ? 'open' : ''}`} onClick={onClose}></div>
      <div className={`sheet ${open ? 'open' : ''}`} onClick={(e) => e.stopPropagation()}>
        <div className="grabber"></div>
        {hasHead && (
          <div className="sheet-head">
            <div className="left">
              {title && <div className="title">{title}</div>}
              {sub && <div className="sub">{sub}</div>}
            </div>
            {peakClose && (
              <button className="close" onClick={onClose} aria-label="Schließen">
                <Icon name="x" size={16} />
              </button>
            )}
          </div>
        )}
        <div className="sheet-body">{children}</div>
      </div>
    </>
  );
}

/* ───── Activity chip ───── */
function Chip({ label, pts, on, onClick }) {
  return (
    <button
      className={`chip ${on ? 'on' : ''}`}
      onClick={(e) => { e.stopPropagation(); onClick && onClick(e); }}
    >
      {label}
      <span className="pts">{pts === 1 ? '1 Pkt' : `${pts} Pkte`}</span>
    </button>
  );
}

/* ───── Activity dot ───── */
function CategoryDot({ color, size = 8 }) {
  return <span style={{ width: size, height: size, borderRadius: '50%', background: color, display: 'inline-block', flexShrink: 0 }}></span>;
}

/* ───── Daily quick-toggle (visibility + mindset) ───── */
function DailyToggle({ activity, color, on, onClick }) {
  return (
    <button className={`daily-tog ${on ? 'on' : ''}`} onClick={(e) => { e.stopPropagation(); onClick && onClick(e); }}>
      <CategoryDot color={color} />
      <div className="text">
        <div className="name">{activity.short}</div>
        <div className="pts">{activity.pts === 1 ? '1 Punkt' : `${activity.pts} Punkte`}</div>
      </div>
      <span className="check">{on ? <Icon name="check" size={12} stroke={2.5} /> : null}</span>
    </button>
  );
}

/* ───── Contact list row ───── */
function ContactRow({ contact, points, activityIds, onClick }) {
  // Initials from name (max 2 chars, supports "Person 1" → P1)
  const initials = (() => {
    const n = (contact.name || '').trim();
    if (/^Person\s+\d+/i.test(n)) return 'P' + n.match(/\d+/)[0].slice(0, 2);
    const parts = n.split(/\s+/);
    return (parts[0]?.[0] || '?').toUpperCase() + (parts[1]?.[0] || '').toUpperCase();
  })();

  // Colored dots representing distinct activity groups marked today
  const groupIds = Array.from(new Set(activityIds.map(id => ACTIVITY_BY_ID[id]?.groupId).filter(Boolean)));
  const groupColors = {
    sichtbarkeit: 'var(--cat-sicht)',
    kontakt:      'var(--cat-kontakt)',
    followup:     'var(--cat-follow)',
    umsatz:       'var(--cat-umsatz)',
    mindset:      'var(--cat-mindset)',
  };

  return (
    <button className="contact-row" onClick={onClick}>
      <span className="avatar">{initials}</span>
      <div className="body">
        <div className="name">{contact.name}</div>
        <div className="activities">
          {activityIds.length === 0 ? (
            <span className="none">noch keine Aktivität</span>
          ) : (
            <>
              <span className="tag-dots">
                {groupIds.map(g => <span key={g} style={{ background: groupColors[g] }}></span>)}
              </span>
              <span>· {activityIds.length} Aktivität{activityIds.length !== 1 ? 'en' : ''}</span>
            </>
          )}
        </div>
      </div>
      <span className={`pts ${points > 0 ? 'has' : ''}`}>{points}</span>
    </button>
  );
}

/* ───── Tab bar ───── */
function TabBar({ tab, onChange }) {
  const tabs = [
    { id: 'home',     label: 'Heute',         icon: 'home' },
    { id: 'calendar', label: 'Kalender',      icon: 'calendar' },
    { id: 'settings', label: 'Einstellungen', icon: 'settings' },
  ];
  return (
    <nav className="tabbar">
      {tabs.map(t => (
        <button
          key={t.id}
          className={`tab ${tab === t.id ? 'active' : ''}`}
          onClick={() => onChange(t.id)}
        >
          <Icon name={t.icon} size={17} />
          <span>{t.label}</span>
        </button>
      ))}
    </nav>
  );
}

/* ───── Switch toggle ───── */
function Switch({ on, onChange }) {
  return (
    <button
      className={`switch ${on ? 'on' : ''}`}
      onClick={() => onChange(!on)}
      role="switch"
      aria-checked={on}
    />
  );
}

/* ───── Progress bar (alt hero) ───── */
function ProgressBar({ value, of }) {
  const pct = of > 0 ? Math.min(1, value / of) : 0;
  return (
    <div className="hero-bar">
      <div className="hero-bar-head">
        <span className="num">{value}</span>
        <span className="of">von <b>{of}</b> Punkten heute</span>
        <span className="pct">{Math.round(pct * 100)}%</span>
      </div>
      <div className="track">
        <div className="fill" style={{ transform: `scaleX(${pct})` }}></div>
      </div>
    </div>
  );
}

Object.assign(window, {
  Icon, Btn, ProgressRing, ProgressBar, Sheet, Chip, CategoryDot, DailyToggle, ContactRow, TabBar, Switch,
});

</script>
<script type="text/babel" data-presets="react">
/* ===== info.jsx ===== */
/* AKTIVITÄTSMESSER — Info screen (overlay) */
/* Mapping: app-internal Kurz-Wording ⇄ ÜBERSICHT (volle Beschreibung). */

function InfoScreen({ open, onClose }) {
  const [expanded, setExpanded] = React.useState({});
  const toggle = (id) => setExpanded(e => ({ ...e, [id]: !e[id] }));

  return (
    <div className={`info-overlay ${open ? 'open' : ''}`}>
      <header className="info-head">
        <button className="info-back" onClick={onClose} aria-label="Schließen">
          <Icon name="chevron-left" size={20} />
        </button>
        <div className="info-title">Info</div>
        <span style={{ width: 36 }} aria-hidden="true"></span>
      </header>

      <div className="info-body">
        <section className="info-intro">
          <div className="onb-eyebrow" style={{ color: 'var(--app-primary)' }}>Aktivitäten &amp; Punkte</div>
          <h2>So zählt die 30-Tage-Challenge.</h2>
          <p>Hier siehst du das Kurz-Wording aus der App neben dem vollen Wortlaut aus der ÜBERSICHT — und wieviel Punkte jede Aktivität gibt.</p>
        </section>

        {ACTIVITY_GROUPS.map(grp => {
          const isOpen = !!expanded[grp.id];
          return (
            <section className="info-group" key={grp.id}>
              <button
                onClick={() => toggle(grp.id)}
                aria-expanded={isOpen}
                style={{
                  width: '100%', background: 'transparent', border: 'none',
                  padding: '4px 0', cursor: 'pointer',
                  display: 'flex', alignItems: 'center',
                }}
              >
                <div className="info-group-head" style={{ flex: 1, marginBottom: 0, padding: '0 0 6px' }}>
                  <CategoryDot color={grp.color} size={10} />
                  <span className="info-group-name">{grp.label}</span>
                  <span className="info-group-meta">{grp.perContact ? 'pro Kontakt' : 'einmal pro Tag'}</span>
                </div>
                <Icon
                  name="chevron-down" size={16}
                  style={{
                    color: 'var(--fg-3)', flexShrink: 0, marginBottom: 6,
                    transform: isOpen ? 'rotate(0deg)' : 'rotate(-90deg)',
                    transition: 'transform 220ms cubic-bezier(0.22,1,0.36,1)',
                  }}
                />
              </button>
              {isOpen && (
                <div className="info-cards" style={{ marginTop: 4 }}>
                  {grp.items.map(a => (
                    <article className="info-card" key={a.id}>
                      <div className="info-card-top">
                        <span className="info-short">{a.short}</span>
                        <span className="info-pts">{a.pts === 1 ? '1 Pkt' : `${a.pts} Pkte`}</span>
                      </div>
                      <div className="info-full">{a.label}</div>
                    </article>
                  ))}
                </div>
              )}
            </section>
          );
        })}

        <section className="info-foot">
          <h4>Wie wird gezählt?</h4>
          <p>Jede markierte Aktivität zählt mit ihrem Punktewert. Werden mehrere Aktivitäten bei einem Kontakt gesetzt, werden die Einzelpunkte summiert. Das Tagesergebnis ist die Summe über alle Kontakte sowie deine Sichtbarkeits- und Mindset-Aktivitäten an diesem Tag.</p>
          <h4 style={{ marginTop: 18 }}>Pro Kontakt vs. pro Tag</h4>
          <p><b>Pro Kontakt</b> markierst du Aktivitäten im Kontakte-Sheet — sie zählen mehrfach, wenn du sie bei verschiedenen Kontakten setzt. <b>Pro Tag</b> sind Sichtbarkeit und Mindset: einmal pro Tag erledigt, einmal gezählt.</p>
        </section>

        <div style={{ height: 24 }}></div>
      </div>
    </div>
  );
}

Object.assign(window, { InfoScreen });

</script>
<script type="text/babel" data-presets="react">
/* ===== onboarding.jsx ===== */
/* AKTIVITÄTSMESSER — onboarding (3 steps: name → goal → how it works) */

const { useState: useStateOnb } = React;

function Onboarding({ onComplete }) {
  const [step, setStep] = useStateOnb(0);
  const [name, setName] = useStateOnb('');
  const [goal, setGoal] = useStateOnb(6);

  const next = () => setStep(s => Math.min(2, s + 1));
  const back = () => setStep(s => Math.max(0, s - 1));
  const finish = () => onComplete({ name: name.trim() || 'Hallo', dailyGoalDefault: goal });

  return (
    <div className="onb">
      <div className="onb-progress">
        <div className={`seg ${step >= 0 ? 'on' : ''}`}></div>
        <div className={`seg ${step >= 1 ? 'on' : ''}`}></div>
        <div className={`seg ${step >= 2 ? 'on' : ''}`}></div>
      </div>

      {step === 0 && (
        <div className="onb-step">
          <div className="onb-eyebrow">Willkommen zu deinem Activity Tracker</div>
          <h1>Aktivität ist alles. Schön, dass du da bist.</h1>
          <p>Diese App hilft dir, deine täglichen Business-Aktivitäten zu messen — fokussiert und ohne Erfolgsdruck.</p>
          <div className="field" style={{ marginTop: 20 }}>
            <input
              type="text"
              placeholder="Dein Vorname"
              value={name}
              onChange={(e) => setName(e.target.value)}
              autoFocus
              maxLength={28}
            />
            <div className="hint">Wir begrüßen dich damit. Bleibt nur auf deinem Gerät.</div>
          </div>
          <div style={{ flex: 1 }}></div>
          <div className="onb-actions">
            <Btn variant="primary" size="lg" block onClick={next} disabled={!name.trim()}>
              Weiter
            </Btn>
          </div>
        </div>
      )}

      {step === 1 && (
        <div className="onb-step">
          <div className="onb-eyebrow">Tagesziel</div>
          <h1>Wie viele Punkte möchtest du pro Tag sammeln?</h1>
          <p>Ein Tagesziel ist ein freundlicher Anker, kein Maßstab. Du kannst es jederzeit anpassen.</p>

          <div className="goal-display">
            <span className="big">{goal}</span>
            <span className="pkt">Punkte / Tag</span>
          </div>
          <input
            type="range" className="r-range slider"
            min="1" max="30" step="1"
            value={goal}
            onChange={(e) => setGoal(parseInt(e.target.value, 10))}
          />
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: 'var(--fg-3)', marginTop: -8 }}>
            <span>1</span><span>10</span><span>20</span><span>30</span>
          </div>

          <div style={{ flex: 1 }}></div>
          <div className="onb-actions">
            <button className="btn btn-ghost skip" onClick={back}>Zurück</button>
            <Btn variant="primary" size="lg" onClick={next}>Weiter</Btn>
          </div>
        </div>
      )}

      {step === 2 && (
        <div className="onb-step">
          <div className="onb-eyebrow">So funktioniert's</div>
          <h1>Einfach starten — die App führt dich.</h1>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 14, marginTop: 6 }}>
            <Step n={1}
              title="Deinen Bereich wählen"
              text={'„Sichtbarkeit", „Mindset" oder (direkte) „Kontakte" — such dir den Bereich aus, in dem du heute aktiv warst, und tippe auf den Pfeil „>" rechts neben dem Bereich. Dadurch öffnet sich die Anzeige mit den Aktivitäten zu diesem Bereich.'} />
            <Step n={2}
              title="Aktivität eintragen"
              text={'Tippe auf den Kreis „o" bei der passenden Aktivität, um diese auszuwählen. Alles andere — Punkte, Auswertung, Fortschritt — rechnet die App für dich. Du siehst sofort schwarz auf weiß, wie aktiv du wirklich warst — heute, diese Woche und diesen Monat.'} />
          </div>

          <div style={{ flex: 1 }}></div>
          <div className="onb-actions">
            <button className="btn btn-ghost skip" onClick={back}>Zurück</button>
            <Btn variant="primary" size="lg" onClick={finish}>Los geht's</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

function Step({ n, title, text }) {
  return (
    <div style={{ display: 'flex', gap: 14, alignItems: 'flex-start' }}>
      <div style={{
        width: 28, height: 28, borderRadius: 999,
        background: 'var(--app-primary-tint)',
        color: 'var(--app-primary)',
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
        fontFamily: 'var(--font-display)', fontWeight: 500, fontSize: 14,
        flexShrink: 0,
      }}>{n}</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
        <div style={{ fontSize: 14.5, fontWeight: 500, color: 'var(--fg-1)' }}>{title}</div>
        <div style={{ fontSize: 13, color: 'var(--fg-2)', lineHeight: 1.5 }}>{text}</div>
      </div>
    </div>
  );
}

Object.assign(window, { Onboarding });

</script>
<script type="text/babel" data-presets="react">
/* ===== home.jsx ===== */
/* AKTIVITÄTSMESSER — Home (Today) screen with contact sheet */

const { useState: useStateHome, useMemo: useMemoHome, useEffect: useEffectHome, useRef: useRefHome } = React;

function HomeScreen({ state, setState, currentDate, setCurrentDate, onOpenInfo, hero = 'ring' }) {
  const iso = isoDay(currentDate);
  const isToday = sameDay(currentDate, new Date());
  const isPast  = currentDate < new Date() && !isToday;
  const isFuture = currentDate > new Date() && !isToday;

  const day = getDay(state, iso);
  const dailyPts   = dayPoints(state, iso);
  const goal       = dayGoal(state, iso);
  const weekPts    = weekPoints(state, iso);
  const monthPts   = monthPoints(state, iso);

  const [openContact, setOpenContact] = useStateHome(null); // contact id
  const [showAdd, setShowAdd] = useStateHome(false);
  const [newName, setNewName] = useStateHome('');
  const [search, setSearch] = useStateHome('');
  const lastToggleRef = useRefHome(0); // debounce: timestamp of last toggle

  // Collapsed-by-default sections: sichtbarkeit, mindset, kontakt, tagesziel
  const [collapsed, setCollapsed] = useStateHome({
    sichtbarkeit: true,
    mindset: true,
    kontakt: true,
    tagesziel: true,
  });
  const toggleCollapsed = (key) => setCollapsed(c => ({ ...c, [key]: !c[key] }));

  const goalOverridden = day.goal != null;
  function setTodayGoal(g) {
    setState(s => setDailyGoalForDay(s, iso, g));
  }
  function clearGoalOverride() {
    setState(s => ({ ...s, days: { ...s.days, [iso]: { ...getDay(s, iso), goal: null } } }));
  }

  function moveDay(delta) {
    const next = addDays(currentDate, delta);
    if (next < MIN_DATE) return;
    if (next > MAX_DATE) return;
    setCurrentDate(next);
  }

  function toggleDaily(aid) {
    const now = Date.now();
    if (now - lastToggleRef.current < 400) return;
    lastToggleRef.current = now;
    setState(s => toggleDailyActivity(s, iso, aid));
  }
  function toggleContactAct(cid, aid) {
    const now = Date.now();
    if (now - lastToggleRef.current < 400) return;
    lastToggleRef.current = now;
    setState(s => toggleContactActivity(s, iso, cid, aid));
  }
  function commitNewContact() {
    if (!newName.trim()) { setShowAdd(false); return; }
    setState(s => addContact(s, newName.trim()));
    setNewName('');
    setShowAdd(false);
  }

  return (
    <>
      <header className="topbar">
        <div className="greet-line">
          <h2 className="greeting">{isToday ? `Hallo ${state.user.name}` : (isPast ? 'Tagesübersicht' : 'Tag in der Zukunft')}</h2>
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 10 }}>
            <span className="date">{formatDateShort(currentDate)}</span>
            <button className="r-info-btn" onClick={onOpenInfo} aria-label="Info">
              <Icon name="info" size={16} />
            </button>
          </div>
        </div>
        <div className="day-nav">
          <button onClick={() => moveDay(-1)} disabled={addDays(currentDate, -1) < MIN_DATE} aria-label="Tag zurück">
            <Icon name="chevron-left" size={18} />
          </button>
          <div className="label">{formatDateLong(currentDate)}</div>
          <button onClick={() => moveDay(1)} disabled={addDays(currentDate, 1) > MAX_DATE} aria-label="Tag vor">
            <Icon name="chevron-right" size={18} />
          </button>
        </div>
        {!isToday && (
          <div className="notice-banner" style={{ margin: '12px 0 0' }}>
            <Icon name="calendar-clock" size={14} />
            <span className="lbl">{isFuture ? 'Zukünftiger Tag — Eingaben sind nicht aktiv.' : 'Du betrachtest einen vergangenen Tag.'}</span>
            <button onClick={() => setCurrentDate(new Date())}>Zu heute</button>
          </div>
        )}
      </header>

      <div className="scroll">
        {/* Hero — Ring or Bar depending on tweak */}
        {hero === 'bar' ? (
          <section style={{ paddingTop: 12 }}>
            {isToday && <div className="ring-eyebrow" style={{ padding: '0 20px 4px' }}>Heute</div>}
            <ProgressBar value={dailyPts} of={goal} />
          </section>
        ) : (
          <section className="hero-ring">
            {isToday && <div className="ring-eyebrow">Heute</div>}
            <ProgressRing value={dailyPts} of={goal} />
          </section>
        )}

        {/* Tagesziel-Banner — bei Erreichen + Übererfüllung */}
        {goal > 0 && dailyPts >= goal && (
          <div className="overshoot-banner">
            <span className="rocket" aria-hidden="true">🎉</span>
            <span className="text">
              {dailyPts > goal
                ? <><b>+{dailyPts - goal}</b> über dem Tagesziel</>
                : <>Tagesziel erreicht</>}
            </span>
          </div>
        )}

        {/* Stats strip */}
        <div className="stats-strip">
          <div className="stat-cell">
            <div className="label">Diese Woche</div>
            <div className="value">{weekPts}</div>
            <div className="sub">Punkte gesammelt</div>
          </div>
          <div className="stat-cell">
            <div className="label">Dieser Monat</div>
            <div className="value">{monthPts}</div>
            <div className="sub">Punkte gesammelt</div>
          </div>
        </div>

        {/* Sichtbarkeit + Mindset — daily toggles (collapsible) */}
        {DAILY_GROUPS.map(grp => {
          const groupItemIds = new Set(grp.items.map(i => i.id));
          const ptsInGroup = (day.daily || [])
            .filter(id => groupItemIds.has(id))
            .reduce((s, id) => s + (ACTIVITY_BY_ID[id]?.pts || 0), 0);
          const isCollapsed = collapsed[grp.id];
          return (
            <section className="section" key={grp.id}>
              <button
                className="section-title section-title-toggle"
                onClick={() => toggleCollapsed(grp.id)}
                aria-expanded={!isCollapsed}
              >
                <h3 style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
                  <CategoryDot color={grp.color} /> {grp.label}
                </h3>
                <span style={{ display: 'inline-flex', alignItems: 'center', gap: 10 }}>
                  <span className="meta">{ptsInGroup === 1 ? '1 Punkt' : `${ptsInGroup} Punkte`}</span>
                  <Icon name="chevron-down" size={16} style={{ color: 'var(--fg-3)', transform: isCollapsed ? 'rotate(-90deg)' : 'none', transition: 'transform 220ms cubic-bezier(0.22,1,0.36,1)' }} />
                </span>
              </button>
              {!isCollapsed && (
                <div className="daily-grid" style={{ marginTop: 12 }}>
                  {grp.items.map(a => (
                    <DailyToggle
                      key={a.id}
                      activity={a}
                      color={grp.color}
                      on={(day.daily || []).includes(a.id)}
                      onClick={() => !isFuture && toggleDaily(a.id)}
                    />
                  ))}
                </div>
              )}
            </section>
          );
        })}

        {/* Contacts section (collapsible) */}
        <section className="section">
          {(() => {
            const contactPts = Object.values(day.contactActivities || {})
              .flat()
              .reduce((s, id) => s + (ACTIVITY_BY_ID[id]?.pts || 0), 0);
            return (
              <button
                className="section-title section-title-toggle"
                onClick={() => toggleCollapsed('kontakt')}
                aria-expanded={!collapsed.kontakt}
              >
                <h3 style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
                  <CategoryDot color="var(--cat-kontakt)" /> Kontakte
                </h3>
                <span style={{ display: 'inline-flex', alignItems: 'center', gap: 10 }}>
                  <span className="meta">{contactPts === 1 ? '1 Punkt' : `${contactPts} Punkte`}</span>
                  <Icon name="chevron-down" size={16} style={{ color: 'var(--fg-3)', transform: collapsed.kontakt ? 'rotate(-90deg)' : 'none', transition: 'transform 220ms cubic-bezier(0.22,1,0.36,1)' }} />
                </span>
              </button>
            );
          })()}

          {!collapsed.kontakt && (
            <div style={{ marginTop: 12 }}>
              {state.contacts.length > 0 && (
                <div className="contact-search">
                  <Icon name="search" size={14} style={{ color: 'var(--fg-3)' }} />
                  <input
                    type="text"
                    placeholder="Kontakt suchen"
                    value={search}
                    onChange={(e) => setSearch(e.target.value)}
                  />
                  {search && (
                    <button
                      className="contact-search-clear"
                      onClick={() => setSearch('')}
                      aria-label="Suche zurücksetzen"
                    >
                      <Icon name="x" size={12} />
                    </button>
                  )}
                </div>
              )}

              {state.contacts.length === 0 && !showAdd && (
                <div className="empty-state">
                  <h4>Noch keine Kontakte.</h4>
                  <div>Lege deinen ersten Kontakt an — Name reicht.</div>
                </div>
              )}

              {(() => {
                const q = search.trim().toLowerCase();
                const filtered = q
                  ? state.contacts.filter(c => c.name.toLowerCase().includes(q))
                  : state.contacts;
                if (q && filtered.length === 0) {
                  return (
                    <div className="empty-state">
                      <div>Kein Kontakt gefunden für „{search}".</div>
                    </div>
                  );
                }
                return filtered.map(c => (
                  <ContactRow
                    key={c.id}
                    contact={c}
                    points={contactPointsOnDay(state, iso, c.id)}
                    activityIds={(day.contactActivities && day.contactActivities[c.id]) || []}
                    onClick={() => !isFuture && setOpenContact(c.id)}
                  />
                ));
              })()}

              {showAdd ? (
                <div className="new-contact-form">
                  <input
                    type="text" placeholder="Vorname oder Spitzname"
                    value={newName} onChange={(e) => setNewName(e.target.value)}
                    autoFocus
                    onKeyDown={(e) => { if (e.key === 'Enter') commitNewContact(); if (e.key === 'Escape') { setShowAdd(false); setNewName(''); } }}
                    maxLength={32}
                  />
                  <button className="cancel" onClick={() => { setShowAdd(false); setNewName(''); }}>Abbrechen</button>
                  <button onClick={commitNewContact}>Hinzufügen</button>
                </div>
              ) : (
                <button className="add-contact-btn" onClick={() => setShowAdd(true)} disabled={isFuture}>
                  <Icon name="plus" size={16} />
                  Kontakt hinzufügen
                </button>
              )}
            </div>
          )}
        </section>

        {/* ───── Divider ───── */}
        <div className="goal-divider"></div>

        {/* Tagesziel — per-day override (collapsible, default collapsed) */}
        <section className="section goal-section">
          <button
            className="section-title section-title-toggle"
            onClick={() => toggleCollapsed('tagesziel')}
            aria-expanded={!collapsed.tagesziel}
          >
            <h3 style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
              <Icon name="target" size={14} style={{ color: 'var(--fg-2)' }} />
              Tagesziel
            </h3>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 10 }}>
              <span className="meta">
                {goal} {goal === 1 ? 'Punkt' : 'Punkte'}
                {goalOverridden && <span style={{ color: 'var(--app-primary)', marginLeft: 6 }}>· angepasst</span>}
              </span>
              <Icon name="chevron-down" size={16} style={{ color: 'var(--fg-3)', transform: collapsed.tagesziel ? 'rotate(-90deg)' : 'none', transition: 'transform 220ms cubic-bezier(0.22,1,0.36,1)' }} />
            </span>
          </button>

          {!collapsed.tagesziel && (
            <div className="goal-slider-row" style={{ marginTop: 12 }}>
              <div className="display">
                <span className="big">{goal}</span>
                <span className="lbl">{isToday ? 'Punkte heute' : `Punkte am ${formatDateShort(currentDate)}`}</span>
              </div>
              <input
                type="range" className="r-range"
                min="1" max="30" step="1"
                value={goal}
                onChange={(e) => setTodayGoal(parseInt(e.target.value, 10))}
                disabled={isFuture}
              />
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 8, gap: 12 }}>
                <span style={{ fontSize: 11.5, color: 'var(--fg-3)', lineHeight: 1.4 }}>
                  {goalOverridden
                    ? `Für diesen Tag angepasst. Standard wäre ${state.user.dailyGoalDefault} Pkte.`
                    : `Aktueller Standard für alle Tage. In Einstellungen änderbar.`}
                </span>
                {goalOverridden && (
                  <button
                    onClick={clearGoalOverride}
                    style={{ color: 'var(--app-primary)', fontSize: 12, fontWeight: 500, whiteSpace: 'nowrap', flexShrink: 0 }}
                  >
                    Zurücksetzen
                  </button>
                )}
              </div>
            </div>
          )}
        </section>

        <div style={{ height: 24 }}></div>
      </div>

      {/* Contact activity sheet */}
      <ContactSheet
        contact={state.contacts.find(c => c.id === openContact)}
        open={!!openContact}
        onClose={() => setOpenContact(null)}
        selected={(day.contactActivities && day.contactActivities[openContact]) || []}
        onToggle={(aid) => toggleContactAct(openContact, aid)}
        onRename={(name) => setState(s => renameContact(s, openContact, name))}
        readonly={isFuture}
      />
    </>
  );
}

/* ───── Contact sheet — marks activities for one contact on the selected day ───── */
function ContactSheet({ contact, open, onClose, selected, onToggle, onRename, readonly }) {
  const [editName, setEditName] = useStateHome(false);
  const [tmpName, setTmpName] = useStateHome('');

  useEffectHome(() => {
    if (open && contact) { setTmpName(contact.name); setEditName(false); }
  }, [open, contact?.id]);

  if (!contact) return <Sheet open={false} onClose={onClose} />;

  const totalPts = selected.reduce((s, aid) => s + (ACTIVITY_BY_ID[aid]?.pts || 0), 0);

  return (
    <Sheet
      open={open}
      onClose={onClose}
      title={null}
      sub={null}
    >
      {/* custom head inside sheet body */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 18 }}>
        <div style={{
          width: 44, height: 44, borderRadius: 999,
          background: 'var(--app-primary-tint)',
          color: 'var(--app-primary)',
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: 'var(--font-display)', fontSize: 16, fontWeight: 500,
          flexShrink: 0,
        }}>
          {(() => {
            const n = contact.name.trim();
            if (/^Person\s+\d+/i.test(n)) return 'P' + n.match(/\d+/)[0].slice(0, 2);
            const parts = n.split(/\s+/);
            return (parts[0]?.[0] || '?').toUpperCase() + (parts[1]?.[0] || '').toUpperCase();
          })()}
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          {editName ? (
            <input
              type="text" value={tmpName} autoFocus
              onChange={(e) => setTmpName(e.target.value)}
              onBlur={() => { if (tmpName.trim()) onRename(tmpName); setEditName(false); }}
              onKeyDown={(e) => { if (e.key === 'Enter') { if (tmpName.trim()) onRename(tmpName); setEditName(false); } }}
              style={{
                width: '100%',
                fontFamily: 'var(--font-display)', fontWeight: 500, fontSize: 20,
                letterSpacing: '-0.01em', color: 'var(--fg-1)',
                background: 'var(--bg-subtle)', borderRadius: 8,
                padding: '6px 10px',
              }}
              maxLength={32}
            />
          ) : (
            <button onClick={() => setEditName(true)} style={{ display: 'flex', alignItems: 'center', gap: 8, textAlign: 'left' }}>
              <div className="title" style={{ fontFamily: 'var(--font-display)', fontWeight: 500, fontSize: 20, letterSpacing: '-0.01em', color: 'var(--fg-1)' }}>{contact.name}</div>
              <Icon name="pencil" size={14} style={{ color: 'var(--fg-3)' }} />
            </button>
          )}
          <div style={{ fontSize: 12, color: 'var(--fg-3)', marginTop: 2 }}>

<script type="text/babel" data-presets="react">
/* ===== calendar.jsx ===== */
/* AKTIVITÄTSMESSER — Calendar / Statistics screen */

const { useState: useStateCal, useMemo: useMemoCal } = React;

function CalendarScreen({ state, currentDate, setCurrentDate, onDayPicked, onOpenInfo }) {
  const [anchor, setAnchor] = useStateCal(() => startOfMonth(currentDate));

  function prevMonth() {
    const p = new Date(anchor.getFullYear(), anchor.getMonth() - 1, 1);
    if (p < startOfMonth(MIN_DATE)) return;
    setAnchor(p);
  }
  function nextMonth() {
    const n = new Date(anchor.getFullYear(), anchor.getMonth() + 1, 1);
    if (n > MAX_DATE) return;
    setAnchor(n);
  }

  const today = new Date();
  const monthStart = startOfMonth(anchor);
  const monthEnd   = endOfMonth(anchor);

  // Build a 6-row × 7-col grid, Monday-first
  const cells = useMemoCal(() => {
    const start = startOfWeek(monthStart);
    const out = [];
    for (let i = 0; i < 42; i++) {
      const d = addDays(start, i);
      out.push(d);
    }
    return out;
  }, [anchor]);

  // Aggregate stats for this month
  const monthIso = isoDay(anchor);
  const monthTotal = monthPoints(state, monthIso);

  // Count days the user MET their goal this month
  const daysMet = useMemoCal(() => {
    let met = 0, attempted = 0;
    for (let d = new Date(monthStart); d <= monthEnd && d <= today; d = addDays(d, 1)) {
      const pts = dayPoints(state, isoDay(d));
      const g   = dayGoal(state, isoDay(d));
      if (d >= MIN_DATE) { attempted++; if (pts >= g) met++; }
    }
    return { met, attempted };
  }, [state, anchor]);

  // Average across past days in the month
  const avgPts = daysMet.attempted > 0 ? Math.round(monthTotal / daysMet.attempted) : 0;

  const canPrev = startOfMonth(addDays(monthStart, -1)) >= startOfMonth(MIN_DATE);
  const canNext = anchor < startOfMonth(MAX_DATE) || sameMonth(anchor, MAX_DATE);

  function sameMonth(a, b) {
    return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth();
  }

  return (
    <>
      <header className="cal-head">
        <button onClick={prevMonth} disabled={!canPrev} aria-label="Vorheriger Monat">
          <Icon name="chevron-left" size={18} />
        </button>
        <div className="month">{formatMonth(anchor)}</div>
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
          <button onClick={nextMonth} disabled={!canNext} aria-label="Nächster Monat">
            <Icon name="chevron-right" size={18} />
          </button>
          <button className="r-info-btn" onClick={onOpenInfo} aria-label="Info">
            <Icon name="info" size={16} />
          </button>
        </div>
      </header>

      <div className="scroll">
        <div className="cal-stats">
          <div className="ks">
            <div className="label">Summe</div>
            <div className="v">{monthTotal}</div>
            <div className="sub">Punkte</div>
          </div>
          <div className="ks">
            <div className="label">Ziel an</div>
            <div className="v">{daysMet.met}</div>
            <div className="sub">von {daysMet.attempted} Tagen</div>
            <div className="sub">ERREICHT</div>
          </div>
          <div className="ks">
            <div className="label">Schnitt</div>
            <div className="v">{avgPts}</div>
            <div className="sub">Pkte / Tag</div>
          </div>
        </div>

        <div className="cal-grid-wrap">
          <div className="cal-grid-headers">
            {DE_WEEKDAYS_SHORT.map(w => <div key={w}>{w}</div>)}
          </div>
          <div className="cal-grid">
            {cells.map((d, i) => {
              const inMonth = d.getMonth() === anchor.getMonth();
              const iso     = isoDay(d);
              const isFut   = d > today;
              const isPast  = d < today && !sameDay(d, today);
              const isToday = sameDay(d, today);
              const tooEarly = d < MIN_DATE;
              const pts = (tooEarly || isFut) ? null : dayPoints(state, iso);
              const goal = dayGoal(state, iso);
              const met  = pts != null && pts >= goal && goal > 0;
              const over = pts != null && goal > 0 && pts > goal;
              const partial = pts != null && pts > 0 && !met;

              let cls = 'cal-cell';
              if (!inMonth) cls += ' empty';
              if (isFut || tooEarly) cls += ' future';
              if (isToday) cls += ' today';
              if (met) cls += ' met';
              else if (partial) cls += ' partial';
              if (over) cls += ' over';
              if (isPast && pts === 0) cls += ' past-zero';

              const interactive = inMonth && !tooEarly && !isFut;
              return (
                <button
                  key={i}
                  className={cls}
                  onClick={() => interactive && onDayPicked(d)}
                  disabled={!interactive}
                  aria-label={formatDateLong(d)}
                >
                  {inMonth && (
                    <>
                      {met && <span className="cell-rocket" aria-hidden="true">🎉</span>}
                      <span className="day">{d.getDate()}</span>
                      <span className="num">{pts == null ? '·' : pts}</span>
                    </>
                  )}
                </button>
              );
            })}
          </div>
        </div>

        <div className="cal-legend">
          <span><span className="leg-sw" style={{ background: 'var(--app-primary)' }}></span>Tagesziel</span>
          <span><span className="leg-sw" style={{ background: 'var(--app-primary-tint)' }}></span>angefangen</span>
          <span><span className="leg-sw" style={{ background: 'var(--bg-subtle)' }}></span>kein Eintrag</span>
        </div>

        {/* Übersicht / day-detail breakdown — always today, per the spec */}
        <DayBreakdown
          state={state}
          date={new Date()}
        />

        <div style={{ height: 24 }}></div>
      </div>
    </>
  );
}

/* ───── Day breakdown (Übersicht) — Counts × points by activity for given date ───── */
function DayBreakdown({ state, date }) {
  const iso = isoDay(date);
  const day = getDay(state, iso);

  // Build counts: activityId → count
  const counts = {};
  (day.daily || []).forEach(aid => { counts[aid] = (counts[aid] || 0) + 1; });
  Object.values(day.contactActivities || {}).forEach(ids => {
    ids.forEach(aid => { counts[aid] = (counts[aid] || 0) + 1; });
  });

  const total = dayPoints(state, iso);
  const hasAny = total > 0;

  return (
    <section className="section" style={{ marginTop: 22 }}>
      <div className="section-title">
        <h3>Übersicht · Heute · {formatDateShort(date)}</h3>
        <span className="meta">{total} Punkte</span>
      </div>

      {!hasAny ? (
        <div className="empty-state" style={{ background: 'var(--bg-subtle)', borderRadius: 14, padding: 22 }}>
          <h4>Noch keine Aktivitäten erfasst.</h4>
          <div>Beginne heute.</div>
        </div>
      ) : (
        <div className="overview-list">
          {ACTIVITY_GROUPS.map(grp => {
            const rows = grp.items
              .map(a => ({ ...a, count: counts[a.id] || 0 }))
              .filter(r => r.count > 0);
            if (rows.length === 0) return null;
            return (
              <div key={grp.id} style={{ marginBottom: 12 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '4px 4px 6px' }}>
                  <CategoryDot color={grp.color} />
                  <span style={{ fontSize: 11, fontWeight: 500, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--fg-2)' }}>{grp.label}</span>
                </div>
                {rows.map(r => (
                  <div key={r.id} className="ov-row">
                    <span className="dot" style={{ background: grp.color }}></span>
                    <span className="label">{r.label}</span>
                    <span className="count">{r.count}× · {r.count * r.pts} Pkt</span>
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      )}
    </section>
  );
}

Object.assign(window, { CalendarScreen, DayBreakdown });

</script>

/* AKTIVITÄTSMESSER — App container, tabs, state, tweaks */

const { useState: useStateApp2, useEffect: useEffectApp2, useRef: useRefApp2 } = React;

function App() {
  const [state, setStateRaw] = useStateApp2(() => loadState());

    ? tweaks.palette
    : ['#677E3D', '#EFF1E5', '#56692F'];

  useEffectApp2(() => {
    if (firstRun.current) { firstRun.current = false; return; }
    saveState(state);
  }, [state]);


  function setState(next) {
    setStateRaw(typeof next === 'function' ? next : () => next);
  }

    setTab('home');

class AppErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  render() {
    const { err } = this.state;
    if (err) {
      return React.createElement('div', {
        style: { padding: 24, fontFamily: 'monospace', fontSize: 13, color: '#a00', background: '#fff', height: '100%', overflowY: 'auto' }
      },
        React.createElement('b', null, 'App-Fehler (bitte Screenshot schicken):'),
        React.createElement('pre', { style: { whiteSpace: 'pre-wrap', wordBreak: 'break-all', marginTop: 8 } },
          String(err) + '\n\n' + (err.stack || '')
        ),
        React.createElement('button', {
          onClick: () => this.setState({ err: null }),
          style: { marginTop: 12, padding: '8px 16px', cursor: 'pointer' }
        }, 'Erneut versuchen')
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(AppErrorBoundary, null, React.createElement(App))
);

</script>
